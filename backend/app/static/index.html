<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agente de Analisis CSV</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="prod-shell">
      <header class="chat-header card prod-header">
        <div>
          <p class="eyebrow">Chat</p>
          <h1>Consulta al agente</h1>
          <p class="status-text" id="dataset-state-text">Cargando dataset activo...</p>
        </div>
        <div class="header-actions">
          <div class="selected-chip" id="active-dataset-chip">Sin dataset activo</div>
          <button class="ghost-button" id="clear-chat" type="button" title="Limpiar chat">Limpiar</button>
        </div>
      </header>

      <section class="card prod-stage" id="selector-stage" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">Seleccion</p>
            <h2>Elige un CSV activo</h2>
          </div>
        </div>
        <p class="muted">Este front de produccion usa un solo dataset activo por navegador.</p>
        <div class="prod-choice-list" id="selector-list"></div>
      </section>

      <section class="card prod-stage" id="upload-stage" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">Carga</p>
            <h2>Sube tu primer CSV</h2>
          </div>
          <span class="badge" id="upload-status-badge">Listo</span>
        </div>
        <form id="upload-form" class="stack">
          <label class="field">
            <span>Archivo CSV</span>
            <input id="upload-file" name="file" type="file" accept=".csv,text/csv" required />
          </label>

          <label class="field">
            <span>Nombre visible</span>
            <input
              id="upload-display-name"
              name="display_name"
              type="text"
              placeholder="Ej. Ventas Q1 2026"
            />
          </label>

          <button class="primary-button" id="upload-submit" type="submit">Subir y activar CSV</button>
          <p class="status-text" id="upload-status-text">No hay datasets cargados todavia.</p>
        </form>
      </section>

      <section class="chat-transcript" id="chat-transcript" hidden></section>

      <section class="card prompt-card" id="prompt-card" hidden>
        <div class="suggestions" id="suggestions"></div>

        <form id="query-form" class="composer">
          <textarea
            id="query-input"
            rows="2"
            placeholder="Pregunta algo como: resumen general, tendencia mensual o top 5 por categoria"
          ></textarea>
          <div class="composer-actions">
            <p class="status-text" id="query-status-text">Selecciona un dataset para habilitar el chat.</p>
            <button class="primary-button" id="query-submit" type="submit" disabled>Enviar</button>
          </div>
        </form>
      </section>
    </main>

    <template id="message-template">
      <article class="message">
        <div class="message-label"></div>
        <div class="message-body"></div>
      </article>
    </template>

    <script src="/static/root.js" defer></script>
  </body>
</html>
